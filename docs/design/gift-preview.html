<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日历卡预览 - 十神能量日历</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F7F4EF;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            margin: 0 auto;
            background: #F7F4EF;
            padding-bottom: 40px;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            align-items: center;
            padding: 16px 20px 32px;
        }

        .nav-back {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2C1810;
            font-size: 26px;
            border-radius: 14px;
            transition: background 0.2s;
        }

        .nav-back:active {
            background: rgba(0,0,0,0.05);
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #2C1810;
            padding-right: 48px;
        }

        /* 内容区 */
        .content {
            padding: 0 24px;
        }

        /* 日历卡预览 */
        .card-preview {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(44, 24, 16, 0.12);
            border: 1px solid rgba(232, 224, 213, 0.6);
            margin-bottom: 28px;
        }

        /* 卡头部 - Logo */
        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .card-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #D65A4E 0%, #B8443A 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            box-shadow: 0 6px 20px rgba(200, 74, 62, 0.25);
        }

        .card-logo-text {
            color: white;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Noto Serif SC', serif;
        }

        .card-app-name {
            font-size: 14px;
            color: #8B7355;
            letter-spacing: 2px;
        }

        /* 干支大字 */
        .card-ganzhi {
            text-align: center;
            margin-bottom: 24px;
        }

        .card-ganzhi-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 72px;
            color: #C84A3E;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: 8px;
            text-shadow: 0 4px 20px rgba(200, 74, 62, 0.2);
        }

        .card-ganzhi-date {
            font-size: 14px;
            color: #8B7355;
        }

        /* 十神标签 */
        .card-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }

        .card-tag {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: white;
            font-weight: 500;
        }

        .card-tag.gold {
            background: linear-gradient(145deg, #E0B850 0%, #C49A3A 100%);
        }

        .card-tag.green {
            background: linear-gradient(145deg, #689A78 0%, #4A7A5A 100%);
        }

        /* 祝福语 */
        .card-message {
            background: #FAF6F0;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .card-message-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            color: #2C1810;
            line-height: 1.6;
            font-weight: 600;
        }

        .card-message-from {
            font-size: 13px;
            color: #B8A892;
            margin-top: 12px;
        }

        /* 用户信息 */
        .card-user-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(232, 224, 213, 0.5);
        }

        .card-user-item {
            text-align: center;
        }

        .card-user-label {
            font-size: 12px;
            color: #B8A892;
            margin-bottom: 4px;
        }

        .card-user-value {
            font-size: 15px;
            color: #2C1810;
            font-weight: 600;
        }

        .card-user-value.gold {
            color: #D4A843;
        }

        /* 操作按钮 */
        .action-section {
            margin-bottom: 20px;
        }

        .btn-share {
            display: block;
            width: 100%;
            height: 60px;
            background: linear-gradient(145deg, #D65A4E 0%, #B8443A 100%);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow:
                0 14px 36px rgba(200, 74, 62, 0.35),
                0 5px 14px rgba(200, 74, 62, 0.22);
            transition: all 0.25s ease;
            text-decoration: none;
            line-height: 60px;
            text-align: center;
            margin-bottom: 14px;
        }

        .btn-share:active {
            transform: scale(0.97);
        }

        .btn-save {
            display: block;
            width: 100%;
            height: 58px;
            background: #FFFFFF;
            color: #2C1810;
            border: 2px solid #E8E0D5;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(44, 24, 16, 0.06);
            transition: all 0.25s ease;
            text-decoration: none;
            line-height: 54px;
            text-align: center;
        }

        .btn-save:active {
            transform: scale(0.97);
            background: #FAF6F0;
        }

        /* 底部提示 */
        .hint-text {
            text-align: center;
            font-size: 13px;
            color: #B8A892;
        }

        /* 底部Tab栏 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 390px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid rgba(232, 224, 213, 0.8);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 20px;
            cursor: pointer;
            text-decoration: none;
        }

        .tab-icon {
            font-size: 26px;
            margin-bottom: 4px;
        }

        .tab-label {
            font-size: 11px;
            color: #B8A892;
            font-weight: 500;
        }

        .tab-item.active .tab-icon,
        .tab-item.active .tab-label {
            color: #C84A3E;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- 导航栏 -->
        <div class="navbar">
            <a href="gift-step1.html" class="nav-back">←</a>
            <span class="nav-title">日历卡预览</span>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <!-- 日历卡预览 -->
            <div class="card-preview">
                <!-- 卡头部 -->
                <div class="card-header">
                    <div class="card-logo">
                        <span class="card-logo-text">十</span>
                    </div>
                    <div class="card-app-name">十神能量日历</div>
                </div>

                <!-- 干支大字 -->
                <div class="card-ganzhi">
                    <div class="card-ganzhi-text">乙未</div>
                    <div class="card-ganzhi-date">出生于1995年08月15日</div>
                </div>

                <!-- 十神标签 -->
                <div class="card-tags">
                    <div class="card-tag gold">正官</div>
                    <div class="card-tag gold">比肩</div>
                    <div class="card-tag green">七杀</div>
                    <div class="card-tag green">劫财</div>
                </div>

                <!-- 祝福语 -->
                <div class="card-message">
                    <p class="card-message-text">「今日宜稳中求进，贵人运不错，适合谈判与推进项目。」</p>
                    <p class="card-message-from">—— 来自好友的祝福</p>
                </div>

                <!-- 用户信息 -->
                <div class="card-user-info">
                    <div class="card-user-item">
                        <div class="card-user-label">日主</div>
                        <div class="card-user-value">乙木</div>
                    </div>
                    <div class="card-user-item">
                        <div class="card-user-label">今日</div>
                        <div class="card-user-value gold">正官</div>
                    </div>
                    <div class="card-user-item">
                        <div class="card-user-label">日期</div>
                        <div class="card-user-value">2026.05.15</div>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-section">
                <a href="#" class="btn-share">分享给朋友</a>
                <a href="#" class="btn-save">保存到相册</a>
            </div>

            <!-- 提示 -->
            <p class="hint-text">朋友点击链接即可查看专属日历</p>
        </div>
    </div>

    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <a href="calendar.html" class="tab-item">
            <div class="tab-icon">📅</div>
            <div class="tab-label">月历</div>
        </a>
        <a href="detail.html" class="tab-item">
            <div class="tab-icon">✨</div>
            <div class="tab-label">今日</div>
        </a>
        <a href="gift-step1.html" class="tab-item active">
            <div class="tab-icon">🎁</div>
            <div class="tab-label">送礼</div>
        </a>
        <a href="onboarding.html" class="tab-item">
            <div class="tab-icon">📝</div>
            <div class="tab-label">生辰</div>
        </a>
        <a href="feedback.html" class="tab-item">
            <div class="tab-icon">💬</div>
            <div class="tab-label">反馈</div>
        </a>
    </div>
</body>
</html>
